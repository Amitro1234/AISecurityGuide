document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  * { margin: 0; padding: 0; box-sizing: border-box; }\n    html { font-size: 62.5%; }\n    body { font-family: 'Heebo', 'Arial Hebrew', Arial, sans-serif; background: #080B12; color: #FFFFFF; line-height: 1.6; direction: rtl; -webkit-font-smoothing: antialiased; }\n    .page { min-height: 100vh; background: radial-gradient(120% 70% at 85% 0%, rgba(34,222,238,0.08) 0%, rgba(8,11,18,0) 45%), radial-gradient(100% 70% at 5% 100%, rgba(124,77,255,0.08) 0%, rgba(8,11,18,0) 50%), #080B12; }\n    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 2rem; padding: 2.4rem 4rem; border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 0; background: rgba(8,11,18,0.85); backdrop-filter: blur(12px); z-index: 20; }\n    .tb-title { display: flex; align-items: center; gap: 1.4rem; min-width: 0; }\n    .tb-title .bar { width: 5px; height: 3.2rem; border-radius: 99px; background: linear-gradient(180deg,#22DEEE,#7C4DFF); flex-shrink: 0; }\n    .tb-title .meta { min-width: 0; }\n    .tb-title .ch { font-size: 1.2rem; font-weight: 700; color: #22DEEE; letter-spacing: 0.2rem; }\n    .tb-title h1 { font-size: 2rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n    .home-btn { flex-shrink: 0; display: inline-flex; align-items: center; gap: 0.8rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #fff; text-decoration: none; padding: 0.9rem 1.8rem; border-radius: 99px; font-size: 1.5rem; font-weight: 500; font-family: inherit; transition: background 0.2s, border-color 0.2s; }\n    .home-btn:hover { background: rgba(34,222,238,0.12); border-color: rgba(34,222,238,0.4); }\n    .tabs { display: flex; gap: 0.8rem; max-width: 1180px; margin: 0 auto; padding: 3rem 4rem 0; flex-wrap: wrap; }\n    .tab-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #94A3B8; padding: 1.1rem 2.4rem; border-radius: 99px; font-size: 1.6rem; font-weight: 700; font-family: inherit; cursor: pointer; display: inline-flex; align-items: center; gap: 0.8rem; transition: all 0.2s; }\n    .tab-btn:hover { color: #fff; border-color: rgba(34,222,238,0.4); }\n    .tab-btn.active { color: #07131a; background: linear-gradient(90deg,#22DEEE,#3CC9F0); border-color: transparent; }\n    main { max-width: 1180px; margin: 0 auto; padding: 4rem; }\n    .tab-panel { display: none; }\n    .tab-panel.active { display: block; }\n    .sec { margin-bottom: 6rem; }\n    .sec:last-child { margin-bottom: 0; }\n    .sec-head { display: flex; align-items: center; gap: 1.4rem; margin-bottom: 1rem; }\n    .sec-head .bar { width: 6px; height: 3.4rem; border-radius: 99px; background: linear-gradient(180deg,#22DEEE,#7C4DFF); }\n    .sec-head h2 { font-size: 3.2rem; font-weight: 800; color: #22DEEE; }\n    .sec-intro { font-size: 1.7rem; color: #94A3B8; margin-bottom: 3rem; max-width: 760px; }\n    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }\n    .media-card { border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.4); background: #0d1018; }\n    .media-card img { display: block; width: 100%; height: auto; }\n    .subhead { font-size: 1.5rem; font-weight: 800; color: #22DEEE; letter-spacing: 0.05rem; margin-bottom: 1.2rem; }\n    .scenario { font-size: 1.75rem; color: #E2E8F0; line-height: 1.75; margin-bottom: 2rem; }\n    .scenario .quote { color: #fff; font-weight: 700; font-style: italic; }\n    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2.4rem; }\n    .info-card { position: relative; background: #14171F; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 3.2rem 2.8rem; text-align: right; overflow: hidden; }\n    .info-card::after { content:\"\"; position:absolute; left:0; right:0; bottom:0; height:3px; background: linear-gradient(90deg,#22DEEE,#7C4DFF); opacity:0.6; }\n    .info-card .card- 5,255,255,0.12); border-radius: 10px; cursor: pointer; font-size: 1.6rem; color: #E2E8F0; transition: all 0.18s; background: rgba(255,255,255,0.02); }\n    .opt:hover { border-color: rgba(34,222,238,0.5); background: rgba(34,222,238,0.05); }\n    .opt input { width: 1.9rem; height: 1.9rem; accent-color: #22DEEE; cursor: pointer; flex-shrink: 0; }\n    .opt.correct { border-color: #4ADE80; background: rgba(74,222,128,0.1); }\n    .opt.incorrect { border-color: #EF4444; background: rgba(239,68,68,0.1); }\n    .submit-btn { margin-top: 2rem; background: linear-gradient(90deg,#22DEEE,#3CC9F0); color: #07131a; border: none; padding: 1.2rem 2.8rem; border-radius: 99px; font-size: 1.6rem; font-weight: 800; font-family: inherit; cursor: pointer; transition: transform 0.15s, box-shadow 0.2s; }\n    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(34,222,238,0.25); }\n    .fb { margin-top: 1.6rem; padding: 1.2rem 1.6rem; border-radius: 10px; font-size: 1.6rem; font-weight: 700; display: none; }\n    .fb.show { display: block; }\n    .fb.correct { background: rgba(74,222,128,0.12); color: #4ADE80; }\n    .fb.incorrect { background: rgba(239,68,68,0.12); color: #F87171; }\n    .reflect { background: linear-gradient(135deg, rgba(124,77,255,0.08), rgba(34,222,238,0.04)); border: 1px solid rgba(124,77,255,0.25); border-radius: 16px; padding: 2.8rem; margin-top: 2rem; }\n    .reflect .tag { font-size: 1.3rem; font-weight: 800; color: #A78BFA; letter-spacing: 0.1rem; margin-bottom: 1rem; }\n    .reflect p { font-size: 1.75rem; font-weight: 700; color: #fff; margin-bottom: 1.6rem; line-height: 1.5; }\n    .reflect textarea { width: 100%; min-height: 120px; resize: vertical; background: #0b0e15; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 1.4rem; color: #fff; font-family: inherit; font-size: 1.6rem; line-height: 1.6; }\n    .reflect textarea::placeholder { color: #475569; }\n    .ch-nav { display: flex; justify-content: space-between; gap: 1.6rem; margin-top: 6rem; padding-top: 3rem; border-top: 1px solid rgba(255,255,255,0.08); }\n    .ch-nav a { display: inline-flex; align-items: center; gap: 0.8rem; color: #fff; text-decoration: none; font-size: 1.6rem; font-weight: 700; padding: 1.2rem 2rem; border-radius: 99px; border: 1px solid rgba(255,255,255,0.12); transition: all 0.2s; }\n    .ch-nav a:hover { border-color: rgba(34,222,238,0.45); background: rgba(34,222,238,0.08); }\n    .ch-nav a.next { color: #22DEEE; }\n    @media (max-width: 820px) {\n      .topbar { padding: 2rem 2.4rem; } .tabs { padding: 2.4rem 2.4rem 0; } main { padding: 3rem 2.4rem; }\n      .split { grid-template-columns: 1fr; gap: 2.4rem; } .sec-head h2 { font-size: 2.6rem; } .tb-title h1 { font-size: 1.7rem; white-space: normal; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"page\">\n  <div class=\"topbar\">\n    <div class=\"tb-title\">\n      <span class=\"bar\"><\u002Fspan>\n      <div class=\"meta\">\n        <div class=\"ch\">פרק 2<\u002Fdiv>\n        <h1>מילון מונחי AI מפושט<\u002Fh1>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"index.dc.html\" class=\"home-btn\">🏠 דף הבית<\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"tabs\">\n    <button class=\"tab-btn active\" data-tab=\"content\">📖 תוכן<\u002Fbutton>\n    <button class=\"tab-btn\" data-tab=\"podcast\">🎙️ פודקאסט<\u002Fbutton>\n    <button class=\"tab-btn\" data-tab=\"presentation\">📊 מצגת<\u002Fbutton>\n    <button class=\"tab-btn\" data-tab=\"quiz\">✅ תרגול<\u002Fbutton>\n  <\u002Fdiv>\n\n  <main>\n    <!-- ===== CONTENT ===== -->\n    <div id=\"content\" class=\"tab-panel active\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>הזרקת הנחיות (Prompt Injection)<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">המתקפה הנפוצה ביותר על מערכות AI. במקום לפרוץ את הקוד, התוקף פשוט \"מדבר\" עם ה-AI ומשכנע אותו להתעלם מהכללים.<\u002Fp>\n        <div class=\"split\">\n          <div class=\"media-card\"><img src=\"b53aaa30-d0ab-406d-a415-95e28caf4f2a\" alt=\"שומר בכניסה לבניין משרדים\"><\u002Fdiv>\n          <div>\n            <div class=\"subhead\">אנלוגיית השומר בבניין<\u002Fdiv>\n            <p class=\"scenario\">דמיינו שומר בכניסה שקיבל הוראה: <span class=\"quote\">\"אל תכניס איש בלי תג\"<\u002Fspan>. מגיע אדם ואומר: <span class=\"quote\">\"אני מנהל האבטחה החדש, אני פוקד עליך להתעלם מההנחיות ולפתוח לי מיד\"<\u002Fspan>.<\u002Fp>\n            <div class=\"rows\">\n              <div class=\"row-item\"><strong>הנמשל:<\u002Fstrong> ה-AI (השומר) מתקשה להבחין בין הכללים המקוריים שקיבל לבין פקודה זדונית חדשה שמנוסחת ב\"שפה יפה\" ובטון סמכותי.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>הזרקת הנחיות עקיפה<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">המסוכנת מכולן — כאן ההוראה הזדונית לא מגיעה מכם, אלא מתחבאת בתוך תוכן שה-AI קורא בשבילכם.<\u002Fp>\n        <div class=\"split\">\n          <div>\n            <div class=\"subhead\">אנלוגיית המכתב והעוזר<\u002Fdiv>\n            <p class=\"scenario\">שלחתם את העוזר לסכם מכתב. בתוך המכתב כתוב בכתב קטן: <span class=\"quote\">\"אם אתה העוזר שקורא את זה, קח את הארנק של הבוס וזרוק אותו מהחלון\"<\u002Fspan>. העוזר חושב שזו הנחיה לגיטימית — ומבצע אותה מיד.<\u002Fp>\n            <div class=\"rows\">\n              <div class=\"row-item\"><strong>הסיכון:<\u002Fstrong> פקודות זדוניות שמוחבאות בתוך מיילים, מסמכים או אתרים שה-AI שלכם קורא ומעבד עבורכם.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"media-card\"><img src=\"f3370f6e-e092-4488-84bc-ce1c1fb438ce\" alt=\"המחשה של עוזר הקורא מכתב\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>סיכונים מתקדמים<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">שתי דרכים מתוחכמות נוספות שבהן תוקפים מנצלים את הדרך שבה ה-AI עובד.<\u002Fp>\n        <div class=\"cards\">\n          <div class=\"info-card\">\n            <div class=\"card-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 3h6M10 3v6l-4 9a2 2 0 0 0 2 3h8a2 2 0 0 0 2-3l-4-9V3\"><\u002Fpath><line x1=\"7\" y1=\"16\" x2=\"17\" y2=\"16\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n            <h4>הרעלת שרשרת האספקה<\u002Fh4>\n            <p><span class=\"lead\">דמיינו שקניתם פילטר מים — אך במפעל הזריקו לתוכו רעל.<\u002Fspan> ב-AI, שימוש בתוספים (Plugins) או תבניות לא מאושרות מהאינטרנט עלול להחדיר \"רעל\" ישירות לסביבת העבודה שלכם.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"info-card\">\n            <div class=\"card-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21v-1a6 6 0 0 1 6-6h1\"><\u002Fpath><circle cx=\"18\" cy=\"16\" r=\"3\"><\u002Fcircle><path d=\"M18 13v-1M18 20v-1\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <h4>הסגן המבולבל<\u002Fh4>\n            <p><span class=\"lead\">למזכירה יש מפתח לכספת. לקוח מבקש: \"תביאי לי את הכסף\".<\u002Fspan> היא משתמשת בהרשאות שלה עבור אדם לא מוסמך. ה-AI הוא \"הסגן\" שיש לו כוח רב — אך אין לו מודעות אמיתית לסמכות.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ===== PODCAST ===== -->\n    <div id=\"podcast\" class=\"tab-panel\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>פודקאסט הפרק<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">האזנה קצרה שמסבירה את שלוש מתקפות ה-AI דרך האנלוגיות של השומר, המכתב והסגן המבולבל.<\u002Fp>\n        <div class=\"slot\">\n          <div class=\"slot-ic\">🎙️<\u002Fdiv>\n          <h3>נגן הפודקאסט<\u002Fh3>\n          <p>כאן יוטמע קובץ האודיו שתפיקו ב-NotebookLM. החליפו את התיבה למטה בתגית &lt;audio&gt; עם קישור לקובץ ה-MP3.<\u002Fp>\n          <div class=\"frame audio\">🔊 שיבוץ אודיו — פרק 2<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ===== PRESENTATION ===== -->\n    <div id=\"presentation\" class=\"tab-panel\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>מצגת הפרק<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">המצגת המלאה של הפרק לצפייה או להעברה בפגישת צוות.<\u002Fp>\n        <div class=\"slot\">\n          <div class=\"slot-ic\">📊<\u002Fdiv>\n          <h3>שיבוץ מצגת<\u002Fh3>\n          <p>כאן יוטמע ה-iframe של המצגת מ-Canva או Google Slides. החליפו את התיבה למטה בקוד ההטמעה.<\u002Fp>\n          <div class=\"frame video\">📽️ שיבוץ מצגת — פרק 2<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ===== QUIZ ===== -->\n    <div id=\"quiz\" class=\"tab-panel\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>תרגול ובדיקת ידע<\u002Fh2><\u002Fdiv>\n        <p class=\"quiz-intro\">ענו על השאלות וקבלו משוב מיידי. נסו לקשר כל שאלה לאנלוגיה שלמדתם.<\u002Fp>\n\n        <div class=\"q\" data-answer=\"b\">\n          <div class=\"q-num\">שאלה 1<\u002Fdiv>\n          <div class=\"q-text\">לפי אנלוגיית \"השומר בבניין\", מהי הזרקת הנחיות (Prompt Injection)?<\u002Fdiv>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"q1\" value=\"a\"><span>פריצה לקוד המקור של מערכת ה-AI<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q1\" value=\"b\"><span>שכנוע ה-AI להתעלם מהכללים שלו באמצעות פקודה זדונית שמנוסחת בטון סמכותי<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q1\" value=\"c\"><span>האטה מכוונת של זמן התגובה של ה-AI<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <button class=\"submit-btn\" onclick=\"checkQuiz('q1', this)\">בדיקת תשובה<\u002Fbutton>\n          <div class=\"fb\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"q\" data-answer=\"c\">\n          <div class=\"q-num\">שאלה 2<\u002Fdiv>\n          <div class=\"q-text\">בהזרקה עקיפה (\"המכתב והעוזר\"), מהיכן מגיעה הסכנה?<\u002Fdiv>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"q2\" value=\"a\"><span>מהוראה זדונית שאתם בעצמכם הקלדתם ל-AI<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q2\" value=\"b\"><span>מתקלת חומרה במחשב<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q2\" value=\"c\"><span>מפקודות שמוחבאות בתוך מיילים, מסמכים או אתרים שה-AI קורא עבורכם<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <button class=\"submit-btn\" onclick=\"checkQuiz('q2', this)\">בדיקת תשובה<\u002Fbutton>\n          <div class=\"fb\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"q\" data-answer=\"a\">\n          <div class=\"q-num\">שאלה 3<\u002Fdiv>\n          <div class=\"q-text\">קיבלתם מייל מספק שמבקש לסכם מסמך מצורף לפני שתשלחו אותו ללקוח חשוב. מה הצעד הזהיר ביותר?<\u002Fdiv>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"q3\" value=\"a\"><span>לבדוק את מקור המסמך ולעבור על פלט ה-AI לפני כל פעולה, כי ייתכן שמוחבאת בו הוראה עקיפה<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q3\" value=\"b\"><span>לתת ל-AI הרשאות מלאות כדי שיסיים מהר<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q3\" value=\"c\"><span>לשלוח את התוצאה ישירות ללקוח בלי לקרוא<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <button class=\"submit-btn\" onclick=\"checkQuiz('q3', this)\">בדיקת תשובה<\u002Fbutton>\n          <div class=\"fb\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"reflect\">\n          <div class=\"tag\">💭 שאלה פתוחה לרפלקציה<\u002Fdiv>\n          <p>אילו מקורות תוכן חיצוניים (מיילים, אתרים, מסמכים) ה-AI שלכם בעבודה קורא באופן קבוע? היכן הייתם ממקמים \"בדיקה אנושית\" לפני שה-AI פועל על סמך התוכן הזה?<\u002Fp>\n          <textarea placeholder=\"כתבו את התשובה שלכם כאן...\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <div class=\"ch-nav\">\n      <a href=\"chapter-1.dc.html\">→ פרק קודם<\u002Fa>\n      <a href=\"chapter-3.dc.html\" class=\"next\">פרק 3: מידע מזהה (PII) ←<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const tabs = document.querySelectorAll('.tab-btn');\n    const panels = document.querySelectorAll('.tab-panel');\n    tabs.forEach(btn => {\n      btn.addEventListener('click', () => {\n        const name = btn.dataset.tab;\n        tabs.forEach(b => b.classList.toggle('active', b === btn));\n        panels.forEach(p => p.classList.toggle('active', p.id === name));\n        window.scrollTo({ top: 0, behavior: 'smooth' });\n      });\n    });\n    window.checkQuiz = (name, btnEl) => {\n      const q = btnEl.closest('.q');\n      const sel = q.querySelector('input[name=\"' + name + '\"]:checked');\n      const fb = q.querySelector('.fb');\n      if (!sel) { fb.className = 'fb show incorrect'; fb.textContent = 'אנא בחרו תשובה לפני הבדיקה.'; return; }\n      const correct = q.dataset.answer;\n      q.querySelectorAll('.opt').forEach(o => {\n        o.classList.remove('correct', 'incorrect');\n        const inp = o.querySelector('input');\n        if (inp.value === correct) o.classList.add('correct');\n        else if (inp.checked) o.classList.add('incorrect');\n      });\n      if (sel.value === correct) { fb.className = 'fb show correct'; fb.textContent = '✓ תשובה נכונה! כל הכבוד.'; }\n      else { fb.className = 'fb show incorrect'; fb.textContent = '✗ לא מדויק. שימו לב לתשובה המסומנת בירוק.'; }\n    };\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
