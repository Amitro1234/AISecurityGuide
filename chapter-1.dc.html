  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"tab-btn\" data-tab=\"video\">🎬 וידאו<\u002Fbutton>\n  <\u002Fdiv>\n\n  <main>\n    <!-- ===== CONTENT ===== -->\n    <div id=\"content\" class=\"tab-panel active\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>תוכנה רגילה מול סוכן AI<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">כדי להבין את הסיכון החדש, צריך קודם להבין מה הופך סוכן AI לשונה כל כך מכל תוכנה שהכרנו עד היום.<\u002Fp>\n        <div class=\"split\">\n          <div class=\"media-card\"><img src=\"41441d7c-3bb6-4457-8875-af444030a3f6\" alt=\"המחשה של בינה מלאכותית\"><\u002Fdiv>\n          <div class=\"features\">\n            <div class=\"feature\">\n              <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"16 18 22 12 16 6\"><\u002Fpolyline><polyline points=\"8 6 2 12 8 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n              <div class=\"ft-body\"><strong>תוכנה מסורתית<\u002Fstrong><span>פועלת לפי חוקים קשיחים. קלט א' תמיד יוביל לפלט ב'. התנהגות צפויה לחלוטין.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"feature\">\n              <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2a3 3 0 0 0-3 3v1H7a4 4 0 0 0-4 4v1a3 3 0 0 0 0 6v1a4 4 0 0 0 4 4h10a4 4 0 0 0 4-4v-1a3 3 0 0 0 0-6v-1a4 4 0 0 0-4-4h-2V5a3 3 0 0 0-3-3z\"><\u002Fpath><circle cx=\"9\" cy=\"13\" r=\"1\"><\u002Fcircle><circle cx=\"15\" cy=\"13\" r=\"1\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n              <div class=\"ft-body\"><strong>סוכן AI<\u002Fstrong><span>פועל בשפה טבעית, בעל יכולת תכנון וקבלת החלטות עצמאית. אותה בקשה יכולה להוביל לפעולות שונות.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"feature\">\n              <div class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2 4 5v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V5l-8-3z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n              <div class=\"ft-body\"><strong>האתגר<\u002Fstrong><span>הגנות סייבר מסורתיות לא יודעות לזהות \"הוראות זדוניות\" שמוסתרות בתוך שיחה רגילה.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>שלושת אתגרי האבטחה המרכזיים<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">האוטונומיה של ה-AI יוצרת שלושה סיכונים חדשים שלא היו קיימים בעולם התוכנה הישן.<\u002Fp>\n        <div class=\"cards\">\n          <div class=\"info-card\">\n            <div class=\"card-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"7\" width=\"16\" height=\"10\" rx=\"2\"><\u002Frect><line x1=\"22\" y1=\"11\" x2=\"22\" y2=\"13\"><\u002Fline><line x1=\"6\" y1=\"11\" x2=\"6\" y2=\"13\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n            <h4>עייפות אישורים<\u002Fh4>\n            <p>כשאנחנו מאשרים עשרות פעולות ביום, מתפתחת נטייה ללחוץ \"אישור\" בלי לקרוא. זהו כרטיס כניסה להאקרים.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"info-card\">\n            <div class=\"card-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"8\" width=\"16\" height=\"12\" rx=\"2\"><\u002Frect><path d=\"M12 8V4M9 4h6\"><\u002Fpath><circle cx=\"9\" cy=\"14\" r=\"1\"><\u002Fcircle><circle cx=\"15\" cy=\"14\" r=\"1\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n            <h4>אוטונומיה מלאה<\u002Fh4>\n            <p>סוכני AI מודרניים יכולים לקרוא קבצים, לשלוח מיילים ולהריץ פקודות במחשב באופן עצמאי לחלוטין.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"info-card\">\n            <div class=\"card-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <h4>ערוץ משותף<\u002Fh4>\n            <p>ה-AI לא מבדיל בין \"הוראות הבוס\" לבין \"הטקסט במסמך שהבוס ביקש לסכם\". הכל מעובד באותו ערוץ.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ===== PODCAST ===== -->\n    <div id=\"podcast\" class=\"tab-panel\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>פודקאסט הפרק<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">האזנה קצרה שמסבירה את ההבדל בין תוכנה רגילה לסוכן AI ואת שלושת אתגרי האבטחה — בדרך לעבודה או בהפסקת הקפה.<\u002Fp>\n        <div class=\"slot\">\n          <div class=\"slot-ic\">🎙️<\u002Fdiv>\n          <h3>נגן הפודקאסט<\u002Fh3>\n          <p>כאן יוטמע קובץ האודיו שתפיקו ב-NotebookLM. החליפו את התיבה למטה בתגית &lt;audio&gt; עם קישור לקובץ ה-MP3.<\u002Fp>\n          <div class=\"frame audio\">🔊 שיבוץ אודיו — פרק 1<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ===== PRESENTATION ===== -->\n    <div id=\"presentation\" class=\"tab-panel\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>מצגת הפרק<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">המצגת המלאה של הפרק לצפייה או להעברה בפגישת צוות.<\u002Fp>\n        <div class=\"slot\">\n          <div class=\"slot-ic\">📊<\u002Fdiv>\n          <h3>שיבוץ מצגת<\u002Fh3>\n          <p>כאן יוטמע ה-iframe של המצגת מ-Canva או Google Slides. החליפו את התיבה למטה בקוד ההטמעה.<\u002Fp>\n          <div class=\"frame video\">📽️ שיבוץ מצגת — פרק 1<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ===== QUIZ ===== -->\n    <div id=\"quiz\" class=\"tab-panel\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>תרגול ובדיקת ידע<\u002Fh2><\u002Fdiv>\n        <p class=\"quiz-intro\">ענו על השאלות וקבלו משוב מיידי. נסו לחשוב על מצבים אמיתיים מהעבודה שלכם.<\u002Fp>\n\n        <div class=\"q\" data-answer=\"b\">\n          <div class=\"q-num\">שאלה 1<\u002Fdiv>\n          <div class=\"q-text\">מה ההבדל המהותי בין תוכנה מסורתית לבין סוכן AI?<\u002Fdiv>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"q1\" value=\"a\"><span>אין הבדל מהותי, סוכן AI הוא פשוט תוכנה מהירה יותר<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q1\" value=\"b\"><span>תוכנה פועלת לפי חוקים קשיחים וצפויים, ואילו סוכן AI מתכנן ומקבל החלטות עצמאיות<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q1\" value=\"c\"><span>סוכן AI תמיד מאובטח יותר מתוכנה רגילה<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <button class=\"submit-btn\" onclick=\"checkQuiz('q1', this)\">בדיקת תשובה<\u002Fbutton>\n          <div class=\"fb\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"q\" data-answer=\"c\">\n          <div class=\"q-num\">שאלה 2<\u002Fdiv>\n          <div class=\"q-text\">\"עייפות אישורים\" מתארת מצב שבו:<\u002Fdiv>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"q2\" value=\"a\"><span>ה-AI מתעייף ומפסיק לעבוד אחרי שעות רבות<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q2\" value=\"b\"><span>המערכת דורשת יותר מדי סיסמאות<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q2\" value=\"c\"><span>אנחנו מאשרים פעולות אוטומטית בלי לקרוא, כי התרגלנו ללחוץ \"אישור\"<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <button class=\"submit-btn\" onclick=\"checkQuiz('q2', this)\">בדיקת תשובה<\u002Fbutton>\n          <div class=\"fb\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"q\" data-answer=\"a\">\n          <div class=\"q-num\">שאלה 3<\u002Fdiv>\n          <div class=\"q-text\">מדוע \"ערוץ משותף\" הוא סיכון? בחרו את ההסבר הנכון:<\u002Fdiv>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"q3\" value=\"a\"><span>ה-AI מעבד באותו ערוץ גם את הוראות המשתמש וגם תוכן חיצוני, ולא מבדיל ביניהם<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q3\" value=\"b\"><span>כמה עובדים משתמשים באותו חשבון AI<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q3\" value=\"c\"><span>ה-AI משתף את התשובות שלו ברשתות חברתיות<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <button class=\"submit-btn\" onclick=\"checkQuiz('q3', this)\">בדיקת תשובה<\u002Fbutton>\n          <div class=\"fb\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"reflect\">\n          <div class=\"tag\">💭 שאלה פתוחה לרפלקציה<\u002Fdiv>\n          <p>חשבו על משימה בעבודה שלכם שהייתם שמחים להעביר לסוכן AI אוטונומי. אילו הרשאות הוא היה צריך — ומה הסיכון הגדול ביותר אם משהו ישתבש?<\u002Fp>\n          <textarea placeholder=\"כתבו את התשובה שלכם כאן...\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <div id=\"video\" class=\"tab-panel\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>וידאו הדגמה<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">Securing Your AI Assistant – The Hidden Command Simulation<\u002Fp>\n        <div style=\"margin-top:1.5rem;\">\n          <video width=\"100%\" controls style=\"border-radius:12px;max-width:900px;display:block;margin:0 auto;\">\n            <source src=\"Securing_Your_AI_Assistant__The_Hidden_Command_Simulation.mp4\" type=\"video/mp4\">\n            Your browser does not support the video tag.\n          <\u002Fvideo>\n        <\u002Fdiv>\n      <\u002Fsection>\n    </div>\n\n    <div class=\"ch-nav\">\n      <a href=\"index.dc.html\">🏠 דף הבית<\u002Fa>\n      <a href=\"chapter-2.dc.html\" class=\"next\">פרק 2: מילון מונחי AI ←<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const tabs = document.querySelectorAll('.tab-btn');\n    const panels = document.querySelectorAll('.tab-panel');\n    tabs.forEach(btn => {\n      btn.addEventListener('click', () => {\n        const name = btn.dataset.tab;\n        tabs.forEach(b => b.classList.toggle('active', b === btn));\n        panels.forEach(p => p.classList.toggle('active', p.id === name));\n        window.scrollTo({ top: 0, behavior: 'smooth' });\n      });\n    });\n\n    window.checkQuiz = (name, btnEl) => {\n      const q = btnEl.closest('.q');\n      const sel = q.querySelector('input[name=\"' + name + '\"]:checked');\n      const fb = q.querySelector('.fb');\n      if (!sel) {\n        fb.className = 'fb show incorrect';\n        fb.textContent = 'אנא בחרו תשובה לפני הבדיקה.';\n        return;\n      }\n      const correct = q.dataset.answer;\n      q.querySelectorAll('.opt').forEach(o => {\n        o.classList.remove('correct', 'incorrect');\n        const inp = o.querySelector('input');\n        if (inp.value === correct) o.classList.add('correct');\n        else if (inp.checked) o.classList.add('incorrect');\n      });\n      if (sel.value === correct) {\n        fb.className = 'fb show correct';\n        fb.textContent = '✓ תשובה נכונה! כל הכבוד.';\n      } else {\n        fb.className = 'fb show incorrect';\n        fb.textContent = '✗ לא מדויק. שימו לב לתשובה המסומנת בירוק.';\n      }\n    };\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
