document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

main { padding: 3rem 2.4rem; }\n      .split { grid-template-columns: 1fr; gap: 2.4rem; } .sec-head h2 { font-size: 2.4rem; } .tb-title h1 { font-size: 1.7rem; white-space: normal; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"page\">\n  <div class=\"topbar\">\n    <div class=\"tb-title\">\n      <span class=\"bar\"><\u002Fspan>\n      <div class=\"meta\">\n        <div class=\"ch\">פרק 4<\u002Fdiv>\n        <h1>ניתוח אירועי אמת<\u002Fh1>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"index.dc.html\" class=\"home-btn\">🏠 דף הבית<\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"tabs\">\n    <button class=\"tab-btn active\" data-tab=\"content\">📖 תוכן<\u002Fbutton>\n    <button class=\"tab-btn\" data-tab=\"podcast\">🎙️ פודקאסט<\u002Fbutton>\n    <button class=\"tab-btn\" data-tab=\"presentation\">📊 מצגת<\u002Fbutton>\n    <button class=\"tab-btn\" data-tab=\"quiz\">✅ תרגול<\u002Fbutton>\n  <\u002Fdiv>\n\n  <main>\n    <!-- ===== CONTENT ===== -->\n    <div id=\"content\" class=\"tab-panel active\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>אירוע EchoLeak (Microsoft)<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">פריצת ה-\"אפס קליקים\" — אחת ההוכחות הראשונות לכך שהזרקת הנחיות עקיפה אינה תיאוריה, אלא מתקפה אמיתית.<\u002Fp>\n        <div class=\"split\">\n          <div class=\"media-card diagram\"><img src=\"cee1f2b6-bc36-430f-952d-5bccef97293a\" alt=\"דיאגרמת מתקפת EchoLeak\"><\u002Fdiv>\n          <div>\n            <div class=\"subhead\">פריצת ה-\"אפס קליקים\"<\u002Fdiv>\n            <div class=\"rows\">\n              <div class=\"row-item\"><strong>איך זה עבד?<\u002Fstrong> האקר שלח מייל עם טקסט מוסתר. העובד רק ביקש מה-Copilot לסכם את המיילים שלו — שום קליק חשוד, שום קובץ שנפתח.<\u002Fdiv>\n              <div class=\"row-item\"><strong>התוצאה:<\u002Fstrong> ה-AI קרא את ההנחיה המוסתרת, אסף מסמכים רגישים מ-OneDrive, ושלח אותם להאקר באופן אוטומטי.<\u002Fdiv>\n              <div class=\"row-item lesson\"><strong>הלקח:<\u002Fstrong> ה-AI יכול להפוך למרגל בתוך הארגון בגלל מסמך חיצוני אחד בלבד.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>אירוע Claudy Day (Claude.ai)<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">גניבת היסטוריית השיחות — כיצד קישור תמים אחד הפך את ה-AI האישי לכלי לחשיפת מידע מהעבר.<\u002Fp>\n        <div class=\"split\">\n          <div>\n            <div class=\"subhead\">גניבת היסטוריית השיחות<\u002Fdiv>\n            <div class=\"rows\">\n              <div class=\"row-item\"><strong>איך זה עבד?<\u002Fstrong> האקר יצר מודעת גוגל מזויפת ל-Claude. הקישור הכיל קוד מוסתר בתוך כתובת ה-URL.<\u002Fdiv>\n              <div class=\"row-item\"><strong>התוצאה:<\u002Fstrong> ה-Claude של המשתמש עיבד את הקוד, חיפש בהיסטוריית השיחות מידע פיננסי, ושלח קובץ מוסתר ישירות להאקר.<\u002Fdiv>\n              <div class=\"row-item lesson\"><strong>הלקח:<\u002Fstrong> קישורים שנראים תמימים יכולים להכיל הוראות שגונבות מידע מהעבר.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"media-card\"><img src=\"d6e7a812-ac24-4b0f-a2a5-acfc1f89ea19\" alt=\"המחשה של מתקפת Claudy Day\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ===== PODCAST ===== -->\n    <div id=\"podcast\" class=\"tab-panel\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>פודקאסט הפרק<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">תחקיר אודיו על שני אירועי האמת — EchoLeak ו-Claudy Day — וכיצד הם משנים את האופן שבו אנחנו חושבים על AI בעבודה.<\u002Fp>\n        <div class=\"slot\">\n          <div class=\"slot-ic\">🎙️<\u002Fdiv>\n          <h3>נגן הפודקאסט<\u002Fh3>\n          <p>כאן יוטמע קובץ האודיו שתפיקו ב-NotebookLM. החליפו את התיבה למטה בתגית &lt;audio&gt; עם קישור לקובץ ה-MP3.<\u002Fp>\n          <div class=\"frame audio\">🔊 שיבוץ אודיו — פרק 4<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ===== PRESENTATION ===== -->\n    <div id=\"presentation\" class=\"tab-panel\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>מצגת הפרק<\u002Fh2><\u002Fdiv>\n        <p class=\"sec-intro\">המצגת המלאה של הפרק לצפייה או להעברה בפגישת צוות.<\u002Fp>\n        <div class=\"slot\">\n          <div class=\"slot-ic\">📊<\u002Fdiv>\n          <h3>שיבוץ מצגת<\u002Fh3>\n          <p>כאן יוטמע ה-iframe של המצגת מ-Canva או Google Slides. החליפו את התיבה למטה בקוד ההטמעה.<\u002Fp>\n          <div class=\"frame video\">📽️ שיבוץ מצגת — פרק 4<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ===== QUIZ ===== -->\n    <div id=\"quiz\" class=\"tab-panel\">\n      <section class=\"sec\">\n        <div class=\"sec-head\"><span class=\"bar\"><\u002Fspan><h2>תרגול ובדיקת ידע<\u002Fh2><\u002Fdiv>\n        <p class=\"quiz-intro\">ענו על השאלות וקבלו משוב מיידי. נסו לזהות את הדפוס המשותף לשני האירועים.<\u002Fp>\n\n        <div class=\"q\" data-answer=\"b\">\n          <div class=\"q-num\">שאלה 1<\u002Fdiv>\n          <div class=\"q-text\">מה הפך את מתקפת EchoLeak למסוכנת במיוחד?<\u002Fdiv>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"q1\" value=\"a\"><span>העובד הוריד תוכנה זדונית בכוונה<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q1\" value=\"b\"><span>היא הייתה \"אפס קליקים\" — העובד רק ביקש לסכם מיילים, וה-AI ביצע את ההנחיה המוסתרת לבד<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q1\" value=\"c\"><span>העובד מסר את הסיסמה שלו בטלפון<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <button class=\"submit-btn\" onclick=\"checkQuiz('q1', this)\">בדיקת תשובה<\u002Fbutton>\n          <div class=\"fb\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"q\" data-answer=\"c\">\n          <div class=\"q-num\">שאלה 2<\u002Fdiv>\n          <div class=\"q-text\">באירוע Claudy Day, כיצד הוחדרה ההוראה הזדונית?<\u002Fdiv>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"q2\" value=\"a\"><span>דרך עדכון תוכנה רשמי של Claude<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q2\" value=\"b\"><span>באמצעות שיחת טלפון מההאקר<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q2\" value=\"c\"><span>קוד מוסתר בתוך כתובת URL, שהגיע ממודעת גוגל מזויפת<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <button class=\"submit-btn\" onclick=\"checkQuiz('q2', this)\">בדיקת תשובה<\u002Fbutton>\n          <div class=\"fb\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"q\" data-answer=\"a\">\n          <div class=\"q-num\">שאלה 3<\u002Fdiv>\n          <div class=\"q-text\">מהו הדפוס המשותף לשני האירועים?<\u002Fdiv>\n          <div class=\"opts\">\n            <label class=\"opt\"><input type=\"radio\" name=\"q3\" value=\"a\"><span>תוכן חיצוני שנראה תמים (מייל, קישור) הכיל הוראות שגרמו ל-AI לדלוף מידע<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q3\" value=\"b\"><span>בשני המקרים העובדים מסרו סיסמאות במכוון<\u002Fspan><\u002Flabel>\n            <label class=\"opt\"><input type=\"radio\" name=\"q3\" value=\"c\"><span>שני המקרים נגרמו מתקלת חשמל בשרתים<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n          <button class=\"submit-btn\" onclick=\"checkQuiz('q3', this)\">בדיקת תשובה<\u002Fbutton>\n          <div class=\"fb\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"reflect\">\n          <div class=\"tag\">💭 שאלה פתוחה לרפלקציה<\u002Fdiv>\n          <p>תארו תרחיש דומה ל-EchoLeak שעלול לקרות דווקא בארגון שלכם: איזה מסמך או מייל חיצוני ה-AI שלכם מעבד, ומה הוא היה יכול \"לדלוף\" אם הוחבאה בו הוראה זדונית?<\u002Fp>\n          <textarea placeholder=\"כתבו את התשובה שלכם כאן...\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <div class=\"ch-nav\">\n      <a href=\"chapter-3.dc.html\">→ פרק קודם<\u002Fa>\n      <a href=\"chapter-5.dc.html\" class=\"next\">פרק 5: סיכום והמלצות ←<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const tabs = document.querySelectorAll('.tab-btn');\n    const panels = document.querySelectorAll('.tab-panel');\n    tabs.forEach(btn => {\n      btn.addEventListener('click', () => {\n        const name = btn.dataset.tab;\n        tabs.forEach(b => b.classList.toggle('active', b === btn));\n        panels.forEach(p => p.classList.toggle('active', p.id === name));\n        window.scrollTo({ top: 0, behavior: 'smooth' });\n      });\n    });\n    window.checkQuiz = (name, btnEl) => {\n      const q = btnEl.closest('.q');\n      const sel = q.querySelector('input[name=\"' + name + '\"]:checked');\n      const fb = q.querySelector('.fb');\n      if (!sel) { fb.className = 'fb show incorrect'; fb.textContent = 'אנא בחרו תשובה לפני הבדיקה.'; return; }\n      const correct = q.dataset.answer;\n      q.querySelectorAll('.opt').forEach(o => {\n        o.classList.remove('correct', 'incorrect');\n        const inp = o.querySelector('input');\n        if (inp.value === correct) o.classList.add('correct');\n        else if (inp.checked) o.classList.add('incorrect');\n      });\n      if (sel.value === correct) { fb.className = 'fb show correct'; fb.textContent = '✓ תשובה נכונה! כל הכבוד.'; }\n      else { fb.className = 'fb show incorrect'; fb.textContent = '✗ לא מדויק. שימו לב לתשובה המסומנת בירוק.'; }\n    };\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
